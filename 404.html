<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Musguito</title>
    
    <link rel="icon" type="image/png" href="Musguito.png">

    <style>
        :root {
            --lima: #bef264;
            --negro: #0f172a;
            --gris-texto: #64748b;
            --transicion: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #ffffff;
            color: var(--negro);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        /* --- ANIMACIONES --- */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .container {
            padding: 2rem;
            max-width: 500px;
            animation: fadeIn 0.8s ease-out;
        }

        /* --- IMAGEN DE ERROR --- */
        .error-img {
            max-width: 250px;
            height: auto;
            margin-bottom: 2rem;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.05));
        }

        h1 {
            font-size: 6rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 1rem;
            letter-spacing: -3px;
        }

        h1 span {
            color: var(--lima);
            text-shadow: 2px 2px 0px var(--negro);
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        p {
            color: var(--gris-texto);
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }

        /* --- BOTÓN VOLVER --- */
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: var(--negro);
            color: #ffffff;
            padding: 16px 32px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: var(--transicion);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-back:hover {
            background-color: var(--lima);
            color: var(--negro);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(190, 242, 100, 0.4);
        }

        /* --- DETALLE DE FONDO --- */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--lima);
            filter: blur(150px);
            opacity: 0.15;
            z-index: -1;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <img src="error.png" alt="Error 404 Musguito" class="error-img">
        
        <h1>4<span>0</span>4</h1>
        <h2>Ruta no encontrada</h2>
        <p>Parece que te has adentrado demasiado en el bosque. Esta página no existe o ha sido movida.</p>
        
        <a href="index.html" class="btn-back">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            Volver al inicio
        </a>
    </div>

</body>
</html>
