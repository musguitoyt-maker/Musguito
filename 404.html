<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 | Musguito</title>
    
    <link rel="icon" type="image/png" href="Musguito.png">

    <style>
        :root {
            --lima: #bef264;
            --negro: #0f172a;
            --gris-texto: #64748b;
            --fuente: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--fuente);
            background-color: #ffffff;
            color: var(--negro);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden; /* Evita scroll horizontal */
        }

        /* --- ANIMACIONES --- */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            width: 100%;
            padding: 20px;
            max-width: 450px;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        /* --- IMAGEN ERROR.PNG --- */
        .error-wrapper {
            margin-bottom: 2rem;
        }

        .error-img {
            max-width: 80%; /* Ajuste automático para móviles */
            height: auto;
            animation: float 5s ease-in-out infinite;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.08));
        }

        /* --- TEXTOS --- */
        h1 {
            font-size: clamp(4rem, 20vw, 7rem); /* Tamaño fluido según pantalla */
            font-weight: 900;
            line-height: 1;
            margin-bottom: 0.5rem;
            letter-spacing: -4px;
        }

        h1 span {
            color: var(--lima);
            -webkit-text-stroke: 2px var(--negro); /* Contorno para legibilidad */
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--negro);
        }

        p {
            color: var(--gris-texto);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            padding: 0 10px;
        }

        /* --- BOTÓN AJUSTADO A MÓVIL --- */
        .btn-home {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background-color: var(--negro);
            color: #ffffff;
            padding: 16px 32px;
            text-decoration: none;
            border-radius: 16px;
            font-weight: 600;
            width: 100%; /* Ancho completo en móvil */
            max-width: 280px; /* Tamaño máximo en escritorio */
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-home:hover {
            background-color: var(--lima);
            color: var(--negro);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(190, 242, 100, 0.4);
        }

        .btn-home svg {
            width: 20px;
            height: 20px;
        }

        /* --- DETALLE DE FONDO --- */
        .glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            background: var(--lima);
            filter: blur(120px);
            opacity: 0.1;
            z-index: -1;
            border-radius: 50%;
        }

        /* --- MEDIA QUERIES (Desktop) --- */
        @media (min-width: 768px) {
            .btn-home {
                width: auto;
            }
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <main class="container">
        <div class="error-wrapper">
            <img src="error.png" alt="Error 404 Musguito" class="error-img">
        </div>

        <h1>4<span>0</span>4</h1>
        <h2>¿Te has perdido?</h2>
        <p>Parece que este rincón del bosque no existe. Regresa a la civilización con Musguito.</p>
        
        <a href="index.html" class="btn-home">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            Volver al Inicio
        </a>
    </main>

</body>
</html>
