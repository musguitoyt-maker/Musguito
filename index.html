<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musguito | Pro</title>
    
    <link rel="icon" type="image/png" href="Musguito.png">

    <style>
        :root {
            --lima: #bef264; /* Color Lima vibrante */
            --lima-dark: #a3e635;
            --negro: #0f172a;
            --gris-suave: #f8fafc;
            --transicion: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #ffffff;
            color: var(--negro);
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* --- ANIMACIONES --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* --- NAVEGACIÓN --- */
        nav {
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--negro);
            font-weight: 800;
            font-size: 1.2rem;
            animation: scaleIn 0.6s ease-out;
        }

        .brand img {
            height: 35px;
            width: auto;
            border-radius: 6px;
        }

        /* --- HERO SECTION --- */
        .hero {
            padding: 140px 1.5rem 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            min-height: 90vh;
        }

        .badge {
            background-color: var(--lima);
            color: var(--negro);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
            animation: fadeInUp 0.6s ease-out;
        }

        .hero h1 {
            font-size: 2.8rem;
            line-height: 1.1;
            font-weight: 900;
            letter-spacing: -0.04em;
            margin-bottom: 20px;
            animation: fadeInUp 0.8s ease-out;
        }

        .hero h1 span {
            background: linear-gradient(90deg, var(--negro), var(--lima-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: #64748b;
            font-size: 1.1rem;
            max-width: 500px;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease-out;
        }

        /* --- BOTÓN PREMIUM --- */
        .btn-main {
            background-color: var(--negro);
            color: #ffffff;
            padding: 18px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: var(--transicion);
            animation: fadeInUp 1.2s ease-out;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }

        .btn-main:hover {
            background-color: var(--lima);
            color: var(--negro);
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -10px rgba(190, 242, 100, 0.5);
        }

        .btn-main svg {
            width: 20px;
            height: 20px;
        }

        /* --- CARD DE TEXTURA (Mobile First) --- */
        .content-card {
            margin-top: 50px;
            background: var(--gris-suave);
            border-radius: 24px;
            padding: 40px 20px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(0,0,0,0.05);
            animation: fadeInUp 1.4s ease-out;
        }

        /* --- RESPONSIVE (Escritorio) --- */
        @media (min-width: 768px) {
            .hero h1 { font-size: 5rem; }
            .hero p { font-size: 1.4rem; max-width: 700px; }
            .content-card { max-width: 800px; padding: 60px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="brand">
            <img src="Musguito.png" alt="Musguito">
            <span>Musguito</span>
        </a>
    </nav>

    <main class="hero">
        <div class="badge">CANAL</div>
        <h1>Contenido que <span>conecta.</span></h1>
        <p>Un espacio dedicado a la comunidad de Minecraft. Descubre Musguito.</p>
        
        <a href="https://www.youtube.com/@Musguito_MC" class="btn-main" target="_blank">
            Suscríbete ahora
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
        </a>

        <div class="content-card">
            <div style="width: 50px; height: 4px; background: var(--lima); margin: 0 auto 20px;"></div>
            <p style="font-size: 0.9rem; color: #94a3b8; font-weight: 500;">PRÓXIMAMENTE</p>
            <h3 style="margin-top: 10px;">Nuevos proyectos en camino</h3>
        </div>
    </main>

</body>
</html>
